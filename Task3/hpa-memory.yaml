# Часть 1. HPA на основе утилизации оперативной памяти.
# Источник метрик — metrics-server (minikube addons enable metrics-server).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scaletestapp-memory
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scaletestapp
  minReplicas: 1
  maxReplicas: 10                 # максимум реплик — 10 (рекомендация задания)
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80  # оптимальный уровень утилизации памяти — 80%

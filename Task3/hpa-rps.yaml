# Часть 2. HPA на основе количества запросов в секунду (RPS) на под.
# Источник метрик — Prometheus + prometheus-adapter (custom.metrics.k8s.io),
# который вычисляет http_requests_per_second из http_requests_total
# (см. monitoring/prometheus-adapter-values.yaml).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scaletestapp-rps
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scaletestapp
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second   # кастомная метрика от prometheus-adapter
        target:
          type: AverageValue
          averageValue: "10"                # целевой RPS на один под

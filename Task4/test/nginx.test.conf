# Task4 · Часть 3 — тестовый конфиг (оба решения + mock-серверы)

worker_processes 1;
events { worker_connections 1024; }

http {
    # Рейт лимитер
    limit_req_status 429;
    underscores_in_headers on;

    map $http_client_type $web_key {
        "web"   $binary_remote_addr;
        default "";
    }
    map $http_client_type $mobile_key {
        "mobile" $binary_remote_addr;
        default  "";
    }
    limit_req_zone $web_key    zone=web_limit:10m    rate=50r/s;
    limit_req_zone $mobile_key zone=mobile_limit:10m rate=30r/s;

    # Upstream
    upstream backend {
        server 127.0.0.1:8081;
    }
    upstream logistics_backend {
        server 127.0.0.1:9090 max_fails=5 fail_timeout=30s;
        server 127.0.0.1:9091 backup;
    }

    # Точка входа :8080
    server {
        listen 8080;

        location /api/ {
            limit_req zone=web_limit    burst=20 nodelay;
            limit_req zone=mobile_limit burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header client_type $http_client_type;
        }

        location /logistics/ {
            proxy_pass http://logistics_backend/;
            proxy_connect_timeout 3s;
            proxy_send_timeout    3s;
            proxy_read_timeout    3s;
            proxy_next_upstream         error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_timeout 3s;
            proxy_next_upstream_tries   2;
        }
    }

    # fb
    server {
        listen 9091;
        location / {
            default_type application/json;
            return 200 '{"status":"degraded","service":"logistics","message":"Circuit open: fallback response"}';
        }
    }

    # Mock - бэкенд приложения
    server {
        listen 8081;
        location /api/ {
            add_header Content-Type application/json;
            if ($http_client_type = "web") {
                return 200 '{"status":"success","service":"web_backend","data":"Web application response"}';
            }
            if ($http_client_type = "mobile") {
                return 200 '{"status":"success","service":"mobile_backend","data":"Mobile application response"}';
            }
            return 200 '{"status":"success","service":"default_backend","data":"Default response"}';
        }
    }

    # Mock -логистика
    server {
        listen 9090;
        location / {
            add_header Content-Type application/json;
            if ($arg_type = "fast") {
                return 200 '{"status":"success","service":"logistics","response_time":"fast","tracking_id":"TRK_FAST_123"}';
            }
            if ($arg_type = "slow") {
                return 200 '{"status":"slow","service":"logistics","response_time":"5000ms","message":"This response is delayed"}';
            }
            if ($arg_type = "error") {
                return 500 '{"status":"error","service":"logistics","error_code":"INTERNAL_ERROR","message":"Service temporarily unavailable"}';
            }
            return 200 '{"status":"success","service":"logistics","data":{"tracking_id":"TRK123456","status":"in_transit"}}';
        }
        location /fast {
            add_header Content-Type application/json;
            return 200 '{"status":"success","endpoint":"fast","message":"Quick response"}';
        }
        location /slow {
            add_header Content-Type application/json;
            return 200 '{"status":"slow","endpoint":"slow","message":"deliberately slow","delay":"5000ms"}';
        }
        location /error {
            add_header Content-Type application/json;
            return 503 '{"status":"error","endpoint":"error","error":"service_unavailable"}';
        }
        location /unavailable {
            add_header Content-Type application/json;
            return 500 '{"status":"error","endpoint":"unavailable","error":"internal_server_error"}';
        }
    }
}

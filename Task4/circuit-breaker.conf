http {
    upstream logistics_backend {
        # основной сервис
        server logistics.company.com max_fails=5 fail_timeout=30s;
        # fb
        server 127.0.0.1:9091 backup;
    }

    server {
        listen 8080;

        location /logistics/ {
            proxy_pass http://logistics_backend;

            # таймаут 3 сек
            proxy_connect_timeout 3s;
            proxy_send_timeout    3s;
            proxy_read_timeout    3s;

            # ошибка
            proxy_next_upstream         error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_timeout 3s;
            proxy_next_upstream_tries   2;
        }
    }

    # fb ответ
    server {
        listen 9091;
        location / {
            default_type application/json;
            return 200 '{"status":"degraded","service":"logistics","message":"Circuit open: fallback response"}';
        }
    }
}
